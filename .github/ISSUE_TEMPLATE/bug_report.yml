name: Bug report
description: Something in the plugin does not work as documented.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what you got instead.
      placeholder: Registered with /register, then rejoined and was asked to register again.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact steps, in order.
      placeholder: |
        1. Join the proxy as a password account.
        2. /register <pass> <pass>
        3. Disconnect and rejoin.
        4. Prompted to register again instead of login.
    validations:
      required: true

  - type: input
    id: velocity-version
    attributes:
      label: Velocity version
      placeholder: "3.4.0-SNAPSHOT"
    validations:
      required: true

  - type: input
    id: limbo-version
    attributes:
      label: LimboAPI version
      placeholder: "1.1.x"
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage backend
      options:
        - SQLite
        - MySQL
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Proxy console output around the failure. Redact IPs and hashes.
      render: text
    validations:
      required: false
